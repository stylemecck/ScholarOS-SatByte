<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="logo_grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="4" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" rx="48" fill="url(#logo_grad)" />
  
  <!-- Abstract Graduation Cap / Bolt Hybrid -->
  <path d="M50 85L100 60L150 85L100 110L50 85Z" fill="white" filter="url(#shadow)" />
  <path d="M100 110V140L125 125L100 155V125L75 140V110" fill="#fbbf24" stroke="white" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Text Elements (Optional for standalone logo, but good to have) -->
  <text x="100" y="185" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="900" font-size="18" style="text-transform: uppercase; letter-spacing: 0.1em;">STP PRO</text>
</svg>
